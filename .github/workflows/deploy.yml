name: Production Deployment Pipeline

on:
  push:
    branches: 
      - main
      - develop
      - staging
  pull_request:
    branches: 
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  NODE_VERSION: '18'
  AWS_REGION: 'us-east-1'

jobs:
  # Job 1: Run automated tests before deployment
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
        continue-on-error: false
      
      - name: Run unit tests
        run: npm run test
        continue-on-error: false
      
      - name: Build packages
        run: npm run build
        continue-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/backend/dist-lambdas/
            packages/frontend/dist/
          retention-days: 7

  # Job 2: Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Job 3: Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: development
      url: https://dev.misra-platform.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          role-duration-seconds: 3600
      
      - name: Deploy backend to dev
        run: |
          cd packages/backend
          npm run build
          npx cdk deploy --context environment=dev --require-approval never
        env:
          ENVIRONMENT: dev
      
      - name: Deploy frontend to dev
        run: |
          cd packages/frontend
          npm run build
          aws s3 sync dist/ s3://misra-platform-frontend-dev-${{ secrets.AWS_ACCOUNT_ID }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }} --paths "/*"
        env:
          VITE_API_URL: ${{ secrets.API_URL_DEV }}
          VITE_USER_POOL_ID: ${{ secrets.USER_POOL_ID_DEV }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.USER_POOL_CLIENT_ID_DEV }}
      
      - name: Run smoke tests
        run: |
          npm run test:integration
        continue-on-error: true
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Development deployment successful",
              attachments: [{
                color: 'good',
                text: `Deployed to dev environment\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Development deployment failed",
              attachments: [{
                color: 'danger',
                text: `Failed to deploy to dev environment\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job 4: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.misra-platform.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          role-duration-seconds: 3600
      
      - name: Deploy backend to staging
        run: |
          cd packages/backend
          npm run build
          npx cdk deploy --context environment=staging --require-approval never
        env:
          ENVIRONMENT: staging
      
      - name: Deploy frontend to staging
        run: |
          cd packages/frontend
          npm run build
          aws s3 sync dist/ s3://misra-platform-frontend-staging-${{ secrets.AWS_ACCOUNT_ID }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_STAGING }} --paths "/*"
        env:
          VITE_API_URL: ${{ secrets.API_URL_STAGING }}
          VITE_USER_POOL_ID: ${{ secrets.USER_POOL_ID_STAGING }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.USER_POOL_CLIENT_ID_STAGING }}
      
      - name: Run E2E tests
        run: |
          npm run test:e2e
        continue-on-error: true
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Staging deployment successful",
              attachments: [{
                color: 'good',
                text: `Deployed to staging environment\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Staging deployment failed",
              attachments: [{
                color: 'danger',
                text: `Failed to deploy to staging environment\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job 5: Deploy to Production (requires manual approval)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://misra-platform.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          role-duration-seconds: 3600
      
      - name: Create deployment backup
        run: |
          echo "Creating backup of current production deployment..."
          aws s3 sync s3://misra-platform-frontend-production-${{ secrets.AWS_ACCOUNT_ID }} s3://misra-platform-frontend-production-backup-${{ secrets.AWS_ACCOUNT_ID }}/$(date +%Y%m%d-%H%M%S)/ --delete
      
      - name: Deploy backend to production
        run: |
          cd packages/backend
          npm run build
          npx cdk deploy --context environment=production --require-approval never
        env:
          ENVIRONMENT: production
      
      - name: Deploy frontend to production
        run: |
          cd packages/frontend
          npm run build
          aws s3 sync dist/ s3://misra-platform-frontend-production-${{ secrets.AWS_ACCOUNT_ID }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }} --paths "/*"
        env:
          VITE_API_URL: ${{ secrets.API_URL_PROD }}
          VITE_USER_POOL_ID: ${{ secrets.USER_POOL_ID_PROD }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.USER_POOL_CLIENT_ID_PROD }}
      
      - name: Run production smoke tests
        run: |
          npm run test:smoke
        continue-on-error: true
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🚀 Production deployment successful",
              attachments: [{
                color: 'good',
                text: `Deployed to production environment\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\nURL: https://misra-platform.com`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🚨 Production deployment failed",
              attachments: [{
                color: 'danger',
                text: `Failed to deploy to production environment\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\nAction required: Check logs and rollback if necessary`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Production Deployment ${{ job.status }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MISRA Platform CI/CD
          body: |
            Production deployment ${{ job.status }}
            
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Branch: ${{ github.ref }}
            
            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # Job 6: Post-deployment validation
  post-deployment-validation:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Health check
        run: |
          echo "Running health checks..."
          curl -f https://misra-platform.com/health || exit 1
          curl -f https://api.misra-platform.com/health || exit 1
      
      - name: Validate API endpoints
        run: |
          echo "Validating API endpoints..."
          # Add your API validation tests here
      
      - name: Monitor error rates
        run: |
          echo "Monitoring error rates..."
          # Add CloudWatch metrics check here
